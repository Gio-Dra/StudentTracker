<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Engagement Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
        input[type="number"] { width: 60px; }
        input[type="text"] { width: 140px; }
    </style>
</head>
<body>
    <h1>Student Engagement Tracker</h1>

    <form method="POST">
        <label><strong>Class Date:</strong></label>
        <input type="date" name="session_date" required>
        <br><br>

        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Engaged 1st Half</th>
                    <th>Engaged 2nd Half</th>
                    <th>Participated</th>
                    <th>Questions/Comments</th>
                    <th>Absent</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.full_name }}</td>
                    <td><input type="checkbox" name="engaged_first_{{ student.id }}"></td>
                    <td><input type="checkbox" name="engaged_second_{{ student.id }}"></td>
                    <td><input type="checkbox" name="participated_{{ student.id }}"></td>
                    <td><input type="number" name="questions_{{ student.id }}" min="0" value="0"></td>
                    <td><input type="checkbox" name="absent_{{ student.id }}"></td>
                    <td><input type="text" name="notes_{{ student.id }}"></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <button type="submit">Save Session</button>
    </form>

    <br>
    <a href="/report">View Report</a>
</body>
</html>
